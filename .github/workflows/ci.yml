name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Node preflight
        run: pnpm run preflight:node

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Generate OpenAPI clients
        run: pnpm --dir lib/api-spec codegen

      - name: Verify generated clients are committed
        run: git diff --exit-code

      - name: API server tests
        run: pnpm --dir artifacts/api-server test

      - name: Gym app tests
        run: pnpm --dir artifacts/gymapp test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    env:
      FITNESS_HUB_SKIP_ENV_LOCAL: "1"
      CLERK_PUBLISHABLE_KEY: pk_test_Y2ktdGVzdC0xLmNsZXJrLmFjY291bnRzLmRldiQ
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktdGVzdC0xLmNsZXJrLmFjY291bnRzLmRldiQ
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktdGVzdC0xLmNsZXJrLmFjY291bnRzLmRldiQ
      CLERK_SECRET_KEY: sk_test_ci_placeholder_not_real
      CLERK_PROXY_ENABLED: "false"
      API_BASE_URL: http://127.0.0.1:4000
      VITE_API_BASE_URL: http://127.0.0.1:4000
      EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173,http://127.0.0.1:3100
      DEFAULT_GYM_ID: gymos-main
      ADMIN_GYM_OWNER_EMAILS: owner@example.com:gymos-main
      ADMIN_ALLOWED_EMAILS: owner@example.com
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:9/postgres?sslmode=disable
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:9/postgres?sslmode=disable
      AI_INTEGRATIONS_GEMINI_BASE_URL: http://127.0.0.1:9
      AI_INTEGRATIONS_GEMINI_API_KEY: ci-placeholder-not-real
      LOG_LEVEL: warn
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run deterministic browser E2E
        run: pnpm run test:e2e:ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --audit-level high --prod
