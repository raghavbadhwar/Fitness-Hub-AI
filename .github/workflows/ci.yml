name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Node preflight
        run: pnpm run preflight:node

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Generate OpenAPI clients
        run: pnpm --dir lib/api-spec codegen

      - name: Verify generated clients are committed
        run: git diff --exit-code

      - name: API server tests
        run: pnpm --dir artifacts/api-server test

      - name: Gym app tests
        run: pnpm --dir artifacts/gymapp test
