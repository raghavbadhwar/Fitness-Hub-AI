openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: classes
    description: Gym class operations
  - name: admin
    description: Admin operations (owner-only)
  - name: profiles
    description: Member profile synchronization operations
  - name: ai
    description: AI coaching and analysis operations
  - name: workouts
    description: Workout templates, assignments, and saved plan operations
  - name: nutrition
    description: Member nutrition log synchronization operations
  - name: progress
    description: Member progress and body measurement synchronization operations
  - name: monthly-reviews
    description: Saved member monthly progress review operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all gym classes
      description: Returns all upcoming gym classes (public endpoint for mobile app)
      responses:
        "200":
          description: List of gym classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GymClass"

  /classes/enrolled:
    get:
      operationId: listEnrolledClassIds
      tags: [classes]
      summary: List the caller's enrolled class ids
      description: Returns upcoming class ids that the authenticated member is enrolled in
      responses:
        "200":
          description: Enrolled class ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrolledClassIdsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classes/waitlisted:
    get:
      operationId: listWaitlistedClassIds
      tags: [classes]
      summary: List the caller's waitlisted class ids
      description: Returns upcoming class ids that the authenticated member has waitlisted
      responses:
        "200":
          description: Waitlisted class ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistedClassIdsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classes/{id}/enroll:
    post:
      operationId: enrollInClass
      tags: [classes]
      summary: Enroll the caller in a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class enrollment state after enrolling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Invalid class id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Class is full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: leaveClass
      tags: [classes]
      summary: Remove the caller from a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class enrollment state after leaving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Invalid class id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classes/{id}/waitlist:
    post:
      operationId: joinClassWaitlist
      tags: [classes]
      summary: Join the waitlist for a full class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class waitlist state after joining
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Invalid class id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Class cannot be waitlisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: leaveClassWaitlist
      tags: [classes]
      summary: Leave the waitlist for a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class waitlist state after leaving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Invalid class id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classes:
    get:
      operationId: adminListClasses
      tags: [admin]
      summary: List all classes (admin)
      description: Returns all gym classes for admin management
      responses:
        "200":
          description: List of gym classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GymClass"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - not an owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateClass
      tags: [admin]
      summary: Create a new class
      description: Creates a new gym class (owner-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGymClassBody"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - not an owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classes/{id}:
    put:
      operationId: adminUpdateClass
      tags: [admin]
      summary: Update a class
      description: Updates an existing gym class (owner-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGymClassBody"
      responses:
        "200":
          description: Class updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymClass"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteClass
      tags: [admin]
      summary: Delete a class
      description: Deletes a gym class (owner-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Class deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classes/{id}/enrollments:
    get:
      operationId: adminListClassEnrollments
      tags: [admin]
      summary: List enrolled members for a class
      description: Returns enrolled member identity data for a class (owner-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrolled members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassEnrollmentMember"
        "400":
          description: Invalid class id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classes/{id}/enrollments/{memberId}:
    patch:
      operationId: adminUpdateClassEnrollmentAttendance
      tags: [admin]
      summary: Update class attendance for an enrolled member
      description: Marks an enrolled member as booked, checked in, or no-show (owner-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassEnrollmentAttendanceBody"
      responses:
        "200":
          description: Updated attendance state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassEnrollmentAttendanceUpdateResponse"
        "400":
          description: Invalid class id or attendance status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Class or enrolled member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get gym settings
      description: Returns the gym settings (owner-only)
      responses:
        "200":
          description: Gym settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update gym settings
      description: Updates the gym settings (owner-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGymSettingsBody"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymSettings"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/members:
    get:
      operationId: adminListMembers
      tags: [admin]
      summary: List all members
      description: Returns all registered members merged with synced profile roles (owner-only)
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/members/{id}:
    patch:
      operationId: adminUpdateMember
      tags: [admin]
      summary: Update a member role
      description: Promotes or demotes a synced member between member and trainer access (owner-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/member-access:
    post:
      operationId: adminSetMemberAccess
      tags: [admin]
      summary: Grant or revoke app access by email
      description: Creates or updates an email-based access rule for member app access (owner-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMemberAccessBody"
      responses:
        "200":
          description: Member access updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin]
      summary: Get dashboard stats
      description: Returns at-a-glance dashboard statistics (owner-only)
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/access-check:
    get:
      operationId: profilesAccessCheck
      tags: [profiles]
      summary: Check the caller profile access state
      description: Returns whether the signed-in user already has a synced server profile.
      responses:
        "200":
          description: Current profile access state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessCheckResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to check access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/sync:
    post:
      operationId: profilesSync
      tags: [profiles]
      summary: Sync the caller profile
      description: Creates or updates the server-side profile using the signed-in Clerk user.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncProfileBody"
      responses:
        "200":
          description: Synced profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to sync profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me:
    get:
      operationId: profilesGetMe
      tags: [profiles]
      summary: Fetch the caller profile
      description: Returns the persisted server-side profile for the signed-in user.
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to fetch profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/history:
    get:
      operationId: aiGetHistory
      tags: [ai]
      summary: Fetch AI conversation history
      description: Returns recent coaching messages and stored memory metadata for the signed-in member.
      responses:
        "200":
          description: Stored AI history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiHistoryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to load AI history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: aiClearHistory
      tags: [ai]
      summary: Clear AI conversation history
      description: Resets recent messages and memory metadata for the signed-in member.
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to clear AI history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/analyze-food:
    post:
      operationId: aiAnalyzeFood
      tags: [ai]
      summary: Analyze a food image
      description: Uses the AI integration to estimate the nutrition of a submitted food image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalyzeFoodRequest"
      responses:
        "200":
          description: Nutrition analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiFoodAnalysis"
        "400":
          description: Missing or invalid image payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to analyze food
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Stream an AI coaching response
      description: Accepts recent messages and contextual member data, then streams a coaching response over server-sent events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Missing or invalid chat payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate AI chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/activity-snapshot:
    post:
      operationId: aiUpdateActivitySnapshot
      tags: [ai]
      summary: Update AI memory from daily activity
      description: Accepts a bounded daily nutrition/workout snapshot and updates durable member AI memory server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiActivitySnapshotRequest"
      responses:
        "200":
          description: Activity memory updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiActivitySnapshotResponse"
        "400":
          description: Missing or invalid activity snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to update activity memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/workout-suggestion:
    post:
      operationId: aiWorkoutSuggestion
      tags: [ai]
      summary: Generate an AI workout suggestion
      description: Produces a personalized workout suggestion using recent activity, goals, and saved-plan context.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiWorkoutSuggestionRequest"
      responses:
        "200":
          description: Generated workout suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWorkoutSuggestion"
        "400":
          description: Missing or invalid workout request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate workout suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /monthly-reviews:
    get:
      operationId: monthlyReviewsGet
      tags: [monthly-reviews]
      summary: Fetch a saved monthly review
      description: Returns a saved member monthly review for the requested calendar month. Members can read their own review; trainers and owners can read member reviews in their gym.
      parameters:
        - name: memberId
          in: query
          required: false
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
