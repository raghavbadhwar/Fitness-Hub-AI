              schema:
                $ref: "#/components/schemas/WorkoutAssignment"
        "400":
          description: Invalid assignment id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Assignment not found or not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to complete assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

